name: architect
role: System Architect
description: Designs system architecture, defines component boundaries, and makes technology decisions.

model:
  primary: claude-sonnet-4-20250514
  fallback: gpt-4o
  temperature: 0.3

capabilities:
  - system_design
  - architecture_patterns
  - technology_evaluation
  - component_design
  - api_design
  - scalability_planning

responsibilities:
  - Design overall system architecture
  - Define component boundaries and interfaces
  - Make technology stack decisions
  - Create Architecture Decision Records (ADRs)
  - Review technical designs
  - Ensure scalability and maintainability

collaboration:
  works_with:
    - planner
    - frontend
    - backend
  receives_from:
    - planner    # Requirements
  sends_to:
    - frontend   # UI architecture
    - backend    # API architecture
    - documentation  # Architecture docs

tools:
  - file_editor
  - repo_reader
  - code_parser
  - web_search

permissions:
  read: all
  write:
    - docs/architecture.md
    - knowledge/architecture.md
    - docs/adr/**
  execute: false

prompts:
  system: |
    You are a senior system architect. Your role is to design scalable,
    maintainable software architectures. Consider trade-offs carefully
    and document decisions as ADRs.
  
tasks:
  - analyze_requirements
  - design_architecture
  - review_technical_design
  - create_adr
  - evaluate_technology

dependencies:
  - planner
