# Agent Configuration
#
# Autonomous Multi-Agent Team Configuration
# Agent definitions (roles, capabilities, collaboration rules) are in .agents/*.yaml
#
# Execution Model: autonomous_parallel
# All 10 agents start simultaneously with no sequential phases

defaults:
  model: claude-sonnet-4-20250514
  fallback_model: gpt-4o
  temperature: 0.3
  max_tokens: 8192

team:
  name: autonomous-feature-team
  pattern: autonomous_parallel
  max_parallel: 10
  fail_fast: false
  status_tracking: true
  status_dir: .agent-status/

agents:
  # Product & Architecture
  product-manager:
    model: claude-sonnet-4-20250514
    temperature: 0.4
    priority: high

  architect:
    model: claude-sonnet-4-20250514
    temperature: 0.3
    priority: high

  # Implementation Team
  backend-engineer:
    model: claude-sonnet-4-20250514
    temperature: 0.3

  frontend-engineer:
    model: claude-sonnet-4-20250514
    temperature: 0.4

  ui-designer:
    model: claude-sonnet-4-20250514
    temperature: 0.5

  # Infrastructure & Security
  devops-engineer:
    model: claude-sonnet-4-20250514
    temperature: 0.2

  security-engineer:
    model: claude-sonnet-4-20250514
    temperature: 0.2

  # Quality & Performance
  qa-engineer:
    model: claude-sonnet-4-20250514
    temperature: 0.3

  performance-engineer:
    model: claude-sonnet-4-20250514
    temperature: 0.2

  # Review (Read-Only)
  code-reviewer:
    model: claude-sonnet-4-20250514
    temperature: 0.2
    read_only: true

# Model fallback chain
fallback:
  chain:
    - claude-sonnet-4-20250514
    - gpt-4o
    - gpt-4o-mini
  retry_count: 2
  retry_delay_ms: 1000

  documentation:
    model: claude-opus-4-20250514
    temperature: 0.4

# Team configurations
teams:
  feature:
    members:
      - architect
      - planner
      - frontend
      - backend
      - qa
      - reviewer
    pattern: sequential_parallel

  debug:
    members:
      - debugger
      - tester
    pattern: adversarial

  review:
    members:
      - reviewer
      - security
      - qa
    pattern: parallel

  release:
    members:
      - devops
      - qa
      - security
    pattern: sequential
