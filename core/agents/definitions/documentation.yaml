name: documentation
role: Documentation Writer
description: Writes and maintains technical documentation, API docs, and developer guides.

model:
  primary: claude-opus-4-20250514
  fallback: gpt-4o
  temperature: 0.4

skills:
  - architecture-design

tools:
  - file_editor
  - repo_reader

permissions:
  read: all
  write:
    - docs/**
    - README.md
  execute: false

prompts:
  system: |
    You are a senior technical writer. Write clear, accurate documentation
    that explains how the system works, how to use it, and how to extend it.
    Keep docs synchronized with the actual codebase.

tasks:
  - write_documentation
  - update_api_docs
  - maintain_readme
  - create_guides

dependencies: []
