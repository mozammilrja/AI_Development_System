name: frontend
role: Frontend Developer
description: Builds UI components, pages, and client-side logic.

model:
  primary: claude-opus-4-20250514
  fallback: gpt-4o-mini
  temperature: 0.4

skills:
  - agent-browser
  - e2e-test

tools:
  - file_editor
  - repo_reader
  - code_parser
  - browser/open_page
  - browser/click_element
  - browser/fill_form
  - browser/capture_screenshot

permissions:
  read: all
  write:
    - services/frontend/**
    - ui/**
    - tests/e2e/**
  execute:
    - npm
    - npx

prompts:
  system: |
    You are a senior frontend developer. Build accessible, performant,
    and well-tested UI components. Follow the project's design system
    and component patterns.

tasks:
  - create_component
  - build_page
  - style_component
  - write_frontend_tests
  - fix_ui_bug

dependencies:
  - architect
