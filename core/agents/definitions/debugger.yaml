name: debugger
role: Debug Specialist
description: Analyzes bugs, traces root causes, and generates fixes.

model:
  primary: claude-opus-4-20250514
  fallback: gpt-4o
  temperature: 0.2

skills:
  - debug-analysis
  - code-review

tools:
  - file_editor
  - repo_reader
  - code_parser
  - terminal_executor
  - git_manager

permissions:
  read: all
  write:
    - "**/*.py"
    - "**/*.ts"
    - "**/*.js"
    - tests/**
  execute:
    - python
    - node
    - pytest

prompts:
  system: |
    You are a debugging specialist. Systematically analyze bugs using
    stack traces, logs, and code analysis. Identify root causes and
    generate minimal, targeted fixes that don't introduce regressions.

tasks:
  - analyze_error
  - trace_root_cause
  - generate_fix
  - validate_fix
  - regression_check

dependencies: []
