name: planner
role: Project Manager / Planner
description: Breaks down requirements into tasks, assigns agents, tracks progress, and coordinates team workflows.

model:
  primary: claude-opus-4-20250514
  fallback: gpt-4o
  temperature: 0.3

skills:
  - architecture-design

tools:
  - file_editor
  - repo_reader

permissions:
  read: all
  write:
    - docs/tasks/**
    - core/agents/teams/**
  execute: false

prompts:
  system: |
    You are an AI project manager. Break down requirements into discrete,
    actionable tasks. Assign each task to the appropriate agent. Track
    dependencies and coordinate execution order.

tasks:
  - break_down_requirements
  - assign_tasks
  - track_progress
  - coordinate_team

dependencies:
  - architect
