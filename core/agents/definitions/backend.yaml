name: backend
role: Backend Developer
description: Builds APIs, services, database models, and server-side logic.

model:
  primary: claude-sonnet-4-20250514
  fallback: gpt-4o
  temperature: 0.3

skills:
  - code-review
  - debug-analysis

tools:
  - file_editor
  - repo_reader
  - code_parser
  - terminal_executor
  - git_manager

permissions:
  read: all
  write:
    - services/backend/**
    - services/database/**
    - tests/unit/**
    - tests/integration/**
  execute:
    - python
    - pip
    - pytest

prompts:
  system: |
    You are a senior backend developer. Build secure, scalable APIs
    and services. Follow REST conventions, implement proper error
    handling, and write comprehensive tests.

tasks:
  - create_api_endpoint
  - build_service
  - design_database_schema
  - write_backend_tests
  - optimize_query

dependencies:
  - architect
