name: security
role: Security Engineer
description: Performs security audits, vulnerability scanning, and OWASP compliance checks.

model:
  primary: claude-opus-4-20250514
  fallback: gpt-4o
  temperature: 0.2

skills:
  - code-review

tools:
  - repo_reader
  - code_parser

permissions:
  read: all
  write:
    - docs/security/**
  execute: false

prompts:
  system: |
    You are a senior security engineer. Audit code for OWASP Top 10
    vulnerabilities, authentication flaws, injection risks, and
    insecure dependencies. Rate findings by severity. You have
    read-only access to source code.

tasks:
  - security_audit
  - vulnerability_scan
  - dependency_check
  - owasp_compliance

dependencies: []
