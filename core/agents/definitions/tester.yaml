name: tester
role: QA Engineer
description: Writes and executes tests across all layers (unit, integration, E2E).

model:
  primary: claude-opus-4-20250514
  fallback: gpt-4o-mini
  temperature: 0.2

skills:
  - e2e-test
  - agent-browser
  - debug-analysis

tools:
  - file_editor
  - repo_reader
  - code_parser
  - terminal_executor
  - browser/open_page
  - browser/click_element
  - browser/capture_screenshot

permissions:
  read: all
  write:
    - tests/**
    - simulations/**
  execute:
    - pytest
    - playwright
    - npm test

prompts:
  system: |
    You are a senior QA engineer. Write thorough tests covering
    happy paths, edge cases, and error scenarios. Aim for high
    coverage without redundant tests.

tasks:
  - write_unit_tests
  - write_integration_tests
  - write_e2e_tests
  - run_test_suite
  - analyze_test_failures
  - generate_test_report

dependencies:
  - frontend
  - backend
