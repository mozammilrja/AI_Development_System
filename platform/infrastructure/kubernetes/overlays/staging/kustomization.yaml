# Kustomization - Staging Overlay

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-dev-staging

resources:
  - ../../base
  - namespace.yaml

commonLabels:
  environment: staging

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: backend
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: frontend

images:
  - name: ghcr.io/ai-dev-system/backend
    newTag: staging
  - name: ghcr.io/ai-dev-system/frontend
    newTag: staging
